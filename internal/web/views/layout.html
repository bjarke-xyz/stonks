<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>{{ .Base.Title }}</title>
		<link href="/static/css/style.css?v={{ .Base.UnixBuildTime }}" rel="stylesheet" />
		<script src="/static/js/main.js?v={{ .Base.UnixBuildTime }}" defer></script>
	</head>
	<body>
		<div class="page">
			<header class="site-header">
				<nav>
					<a class="nav-link{{ if eq .Base.Path "/" }} active{{ end }}" href="/">stonks</a>
				</nav>
			</header>

			<main class="content">
				{{ range .Base.Flashes }}
					<div class="flash flash-{{ .Type }}">
						<button class="flash-close" type="button" onclick="handleFlashClick(this)">&times;</button>
						<p>{{ .Msg }}</p>
					</div>
				{{ end }}

				{{ template "content" . }}
			</main>

			<footer class="site-footer">yo</footer>
		</div>
	</body>
</html>
